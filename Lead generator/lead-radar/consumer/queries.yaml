# Consumer Lead Radar — Search queries per niche en bron.
# Locatie wordt {location} placeholder. Werkt voor NL + BE.
# Pas aan naar jouw doelgroep — voeg subs/queries toe of haal eruit.

defaults:
  reddit_subreddits:
    - thenetherlands
    - Netherlands
    - belgium
    - belgium2
    - dutch
    - amsterdam
    - rotterdam
    - utrecht
    - eindhoven
    - groningen
    - antwerpen
    - gent
    - DIYNL
    - duurzaam

niches:
  warmtepomp:
    keywords_required:
      - warmtepomp
    queries_text:
      - "warmtepomp installateur"
      - "warmtepomp advies"
      - "warmtepomp offerte"
      - "hybride warmtepomp"
      - "lucht water warmtepomp"
      - "warmtepomp aansluiten"
      - "warmtepomp installatie"
      - "isde subsidie warmtepomp"
    google_queries:
      - 'site:reddit.com warmtepomp installateur OR offerte {location}'
      - 'site:gathering.tweakers.net warmtepomp installateur'
      - 'site:bouwinfo.be warmtepomp installateur'
      - '"zoek installateur" warmtepomp {location}'
      - '"wie kan warmtepomp" {location}'
    marktplaats_queries:
      - "warmtepomp installateur"
      - "warmtepomp aansluiten"
      - "warmtepomp installatie"

  airco:
    keywords_required:
      - airco
    queries_text:
      - "airco installateur"
      - "airco plaatsen"
